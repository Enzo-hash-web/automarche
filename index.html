<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoMarché — Vente auto entre particuliers</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E24B4A; --red-light: #fdf0f0; --gray-100: #f5f5f3; --gray-200: #e8e8e5;
      --gray-400: #9a9a95; --gray-700: #3a3a38; --gray-900: #1a1a18; --white: #ffffff;
      --radius: 10px; --radius-lg: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
    header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 20px; font-weight: 600; color: var(--gray-900); display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
    .header-btns { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--gray-200); background: transparent; color: var(--gray-700); transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; }
    .btn:hover { background: var(--gray-100); }
    .btn-primary { background: var(--red); color: white; border-color: var(--red); }
    .btn-primary:hover { background: #c43d3c; }
    .hero { background: var(--white); padding: 48px 24px 40px; text-align: center; border-bottom: 1px solid var(--gray-200); }
    .hero h1 { font-size: 36px; font-weight: 600; color: var(--gray-900); line-height: 1.2; margin-bottom: 10px; }
    .hero h1 span { color: var(--red); }
    .hero p { font-size: 16px; color: var(--gray-400); margin-bottom: 28px; }
    .search-box { max-width: 600px; margin: 0 auto; background: var(--gray-100); border-radius: var(--radius-lg); padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .search-box input, .search-box select { flex: 1; min-width: 140px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--gray-200); background: var(--white); font-family: inherit; font-size: 14px; color: var(--gray-900); outline: none; }
    .search-box button { padding: 10px 22px; background: var(--red); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; }
    .stats { display: flex; justify-content: center; gap: 40px; padding: 24px; background: var(--white); border-bottom: 1px solid var(--gray-200); }
    .stat { text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: var(--gray-900); }
    .stat-label { font-size: 13px; color: var(--gray-400); margin-top: 2px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-header h2 { font-size: 18px; font-weight: 600; }
    .badge { background: #eaf3de; color: #3b6d11; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .car-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; cursor: pointer; transition: transform 0.15s; }
    .car-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .car-img { width: 100%; height: 150px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .car-body { padding: 14px 16px; }
    .car-title { font-size: 15px; font-weight: 600; }
    .car-price { font-size: 20px; font-weight: 600; color: var(--red); margin-top: 10px; }
    .tag { font-size: 12px; padding: 3px 9px; border-radius: 20px; background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
    .form-section { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); padding: 28px; margin-top: 32px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--gray-200); background: var(--gray-100); font-family: inherit; }
    .form-submit { margin-top: 18px; text-align: right; }
    footer { text-align: center; padding: 32px 24px; color: var(--gray-400); font-size: 13px; border-top: 1px solid var(--gray-200); margin-top: 48px; background: var(--white); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius-lg); padding: 28px; max-width: 480px; width: 90%; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#"><div class="logo-dot"></div>AutoMarché</a>
  <div class="header-btns">
    <button class="btn btn-primary" onclick="document.getElementById('deposer').scrollIntoView({behavior:'smooth'})">Déposer une annonce</button>
  </div>
</header>

<div class="hero">
  <h1>Achetez ou vendez votre voiture<br><span>entre particuliers</span></h1>
  <p>Des milliers d'annonces — 100% gratuit, sans intermédiaire</p>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Marque, modèle..." oninput="filterCars()" />
    <select id="search-budget" onchange="filterCars()">
      <option value="">Budget max</option>
      <option value="5000">5 000 €</option>
      <option value="10000">10 000 €</option>
      <option value="20000">20 000 €</option>
      <option value="50000">50 000 €</option>
    </select>
    <button onclick="filterCars()">Rechercher</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="count-annonces">0</div><div class="stat-label">annonces</div></div>
  <div class="stat"><div class="stat-num">100%</div><div class="stat-label">gratuit</div></div>
  <div class="stat"><div class="stat-num">PACA</div><div class="stat-label">région</div></div>
</div>

<div class="container">
  <div class="section-header">
    <h2>Annonces récentes <span class="badge" id="badge-count">0 annonce</span></h2>
  </div>
  <div class="cars-grid" id="cars-grid"></div>

  <div class="form-section" id="deposer">
    <h2>Déposer une annonce gratuite</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Marque *</label>
        <input type="text" id="f-marque" placeholder="Ex: Renault" />
      </div>
      <div class="form-group">
        <label>Modèle *</label>
        <input type="text" id="f-modele" placeholder="Ex: Clio" />
      </div>
      <div class="form-group">
        <label>Année *</label>
        <input type="number" id="f-annee" placeholder="Ex: 2019" />
      </div>
      <div class="form-group">
        <label>Kilométrage *</label>
        <input type="number" id="f-km" placeholder="Ex: 48000" />
      </div>
      <div class="form-group">
        <label>Carburant</label>
        <select id="f-carburant">
          <option>Essence</option>
          <option>Diesel</option>
          <option>Hybride</option>
          <option>Électrique</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prix (€) *</label>
        <input type="number" id="f-prix" placeholder="Ex: 9500" />
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Détails..."></textarea>
      </div>
      <div class="form-group">
        <label>Votre prénom *</label>
        <input type="text" id="f-prenom" placeholder="Ex: Marc" />
      </div>
      <div class="form-group">
        <label>Téléphone *</label>
        <input type="tel" id="f-tel" placeholder="Ex: 06..." />
      </div>
    </div>
    <div class="form-submit">
      <button class="btn btn-primary" onclick="submitAnnonce()">Publier mon annonce</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-detail" style="margin-top:15px; font-size:14px; line-height:1.6;"></div>
    <button class="btn btn-primary" style="width:100%; margin-top:20px;" id="modal-contact">Appeler le vendeur</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const emojis = ['🚗','🚙','🚕','🏎️','🚐','🚌'];
  const SUPABASE_URL = 'https://fulipbhrmniudwburovzr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_4D31CAYY82NdJGKc2t-_4w__yy1GzLN';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let annonces = [];

  async function fetchAnnonces() {
    const { data, error } = await db.from('annonces').select('*').order('id', { ascending: false });
    if (!error && data) {
      annonces = data;
      renderCars(annonces);
    }
  }

  function renderCars(list) {
    const grid = document.getElementById('cars-grid');
    document.getElementById('count-annonces').textContent = list.length;
    document.getElementById('badge-count').textContent = list.length + ' annonce' + (list.length > 1 ? 's' : '');
    grid.innerHTML = list.map((a, i) => `
      <div class="car-card" onclick="openModal(${a.id})">
        <div class="car-img">${a.image || emojis[i % emojis.length]}</div>
        <div class="car-body">
          <div class="car-title">${a.marque} ${a.modele}</div>
          <div style="font-size:13px; color:#9a9a95;">${a.annee} · ${a.km} km</div>
          <div class="car-price">${a.prix} €</div>
        </div>
      </div>
    `).join('');
  }

  async function submitAnnonce() {
    const data = {
      marque: document.getElementById('f-marque').value,
      modele: document.getElementById('f-modele').value,
      annee: parseInt(document.getElementById('f-annee').value),
      km: parseInt(document.getElementById('f-km').value),
      prix: parseInt(document.getElementById('f-prix').value),
      prenom: document.getElementById('f-prenom').value,
      tel: document.getElementById('f-tel').value,
      carburant: document.getElementById('f-carburant').value,
      desc: document.getElementById('f-desc').value,
      image: emojis[Math.floor(Math.random() * emojis.length)]
    };

    const { error } = await db.from('annonces').insert([data]);
    if (error) {
      alert("Erreur : " + error.message);
    } else {
      alert("✅ Annonce publiée !");
      location.reload();
    }
  }

  function openModal(id) {
    const a = annonces.find(x => x.id === id);
    document.getElementById('modal-title').textContent = a.marque + ' ' + a.modele;
    document.getElementById('modal-detail').innerHTML = `
      <b>Prix:</b> ${a.prix} €<br><b>KM:</b> ${a.km}<br><b>Énergie:</b> ${a.carburant}<br>
      <b>Description:</b> ${a.desc}<br><b>Vendeur:</b> ${a.prenom}
    `;
    document.getElementById('modal-contact').onclick = () => window.location.href = 'tel:' + a.tel;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e) { if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open'); }

  fetchAnnonces();
</script>
</body>
</html>
